<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-900 via-brand-700 to-brand-500 p-4">
  <div class="w-full max-w-sm">
    <div class="bg-white rounded-3xl shadow-2xl p-8">
      <!-- Marca -->
      <div class="flex flex-col items-center mb-7">
        <div class="w-14 h-14 rounded-2xl bg-brand-600 flex items-center justify-center shadow-lg shadow-brand-600/30 mb-3">
          <lucide-icon name="store" class="text-white" [size]="28"></lucide-icon>
        </div>
        <h1 class="text-2xl font-bold text-slate-800">POS System</h1>
        <p class="text-sm text-slate-400">Inicia sesión para continuar</p>
      </div>

      <form [formGroup]="form" (ngSubmit)="entrar()" class="space-y-1">
        <div class="campo">
          <label>Usuario</label>
          <div class="relative">
            <lucide-icon name="user" [size]="18"
              class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></lucide-icon>
            <input type="text" formControlName="username" placeholder="admin"
              autocomplete="username" class="pl-10" />
          </div>
        </div>

        <div class="campo">
          <label>Contraseña</label>
          <div class="relative">
            <lucide-icon name="lock" [size]="18"
              class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></lucide-icon>
            <input [type]="verPassword() ? 'text' : 'password'" formControlName="password"
              placeholder="••••••••" autocomplete="current-password" class="pl-10 pr-10" />
            <button type="button" (click)="verPassword.set(!verPassword())"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600">
              <lucide-icon name="eye" [size]="18"></lucide-icon>
            </button>
          </div>
        </div>

        @if (error()) {
          <div class="alert alert-danger">{{ error() }}</div>
        }

        <button type="submit" class="btn btn-primary w-full mt-2" [disabled]="cargando()">
          {{ cargando() ? 'Ingresando...' : 'Ingresar' }}
        </button>
      </form>

      <div class="mt-6 p-3 rounded-xl bg-slate-50 text-center text-xs text-slate-500 space-y-0.5">
        <p class="font-semibold text-slate-600">Credenciales de prueba</p>
        <p>admin / admin123 &nbsp;·&nbsp; cajero / cajero123</p>
      </div>
    </div>
  </div>
</div>
